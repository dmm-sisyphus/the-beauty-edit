<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="font-family:sans-serif;padding:40px;background:#F9F5F0">
  <h2>Beauty Edit — Icon Generator</h2>
  <p>Click each button to download the PNG icon at the correct size.</p>
  <br>
  <button onclick="download(192)">Download icon-192.png</button>
  &nbsp;
  <button onclick="download(512)">Download icon-512.png</button>
  <br><br>
  <canvas id="c" style="border:1px solid #ccc"></canvas>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" rx="18" fill="#4A3228"/>
      <text x="50" y="30" font-family="Georgia,serif" font-size="11"
            fill="#F9F5F0" text-anchor="middle" font-weight="400"
            letter-spacing="5">THE</text>
      <line x1="28" y1="36" x2="72" y2="36" stroke="#D4C4B8" stroke-width="0.6" opacity="0.6"/>
      <text x="50" y="60" font-family="Georgia,serif" font-size="26"
            fill="#F9F5F0" text-anchor="middle" font-weight="700">Beauty</text>
      <text x="50" y="78" font-family="Georgia,serif" font-size="15"
            fill="#D4C4B8" text-anchor="middle" font-style="italic"
            font-weight="400">Edit</text>
    </svg>`;

    function download(size) {
      const canvas = document.getElementById('c');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svg], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
        const a = document.createElement('a');
        a.download = `icon-${size}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      img.src = url;
    }
  </script>
</body>
</html>
